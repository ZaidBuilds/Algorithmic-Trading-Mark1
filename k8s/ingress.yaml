apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradingbot-ingress
  namespace: tradingbot
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - tradingbot.local
        - mlflow.tradingbot.local
        - grafana.tradingbot.local
        - prometheus.tradingbot.local
        - jaeger.tradingbot.local
        - alertmanager.tradingbot.local
      secretName: tradingbot-tls
  rules:
    - host: tradingbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tradingbot
                port:
                  number: 8080
    - host: mlflow.tradingbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
    - host: grafana.tradingbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: prometheus.tradingbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
    - host: jaeger.tradingbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
    - host: alertmanager.tradingbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alertmanager
                port:
                  number: 9093