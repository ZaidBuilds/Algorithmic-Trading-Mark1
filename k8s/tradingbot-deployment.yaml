apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradingbot
  namespace: tradingbot
  labels:
    app: tradingbot
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tradingbot
  template:
    metadata:
      labels:
        app: tradingbot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: tradingbot
          image: quantumtrade/tradingbot:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
            - containerPort: 8000
              name: api
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: POSTGRES_USER
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tradingbot-secrets
                  key: DATABASE_URL
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tradingbot-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: tradingbot-secrets
                  key: TELEGRAM_CHAT_ID
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: tradingbot-secrets
                  key: DISCORD_WEBHOOK_URL
            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tradingbot-secrets
                  key: API_JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: REDIS_PORT
            - name: MLFLOW_HOST
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: MLFLOW_HOST
            - name: MLFLOW_PORT
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: MLFLOW_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: tradingbot-config
                  key: ENVIRONMENT
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tradingbot-hpa
  namespace: tradingbot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tradingbot
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80