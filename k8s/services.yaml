apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: tradingbot
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
