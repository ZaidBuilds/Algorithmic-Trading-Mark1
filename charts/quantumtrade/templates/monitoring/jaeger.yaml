{{- if .Values.monitoring.jaeger.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "quantumtrade.fullname" . }}-jaeger
  labels:
    {{- include "quantumtrade.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.monitoring.jaeger.port }}
      targetPort: {{ .Values.monitoring.jaeger.port }}
      protocol: TCP
      name: jaeger
  selector:
    app.kubernetes.io/name: {{ include "quantumtrade.name" . }}-jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quantumtrade.fullname" . }}-jaeger
  labels:
    {{- include "quantumtrade.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "quantumtrade.name" . }}-jaeger
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "quantumtrade.name" . }}-jaeger
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.49
          ports:
            - containerPort: {{ .Values.monitoring.jaeger.port }}
            - containerPort: 16686
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}