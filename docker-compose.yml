version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: qt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: qt-postgres
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: quantum
      POSTGRES_DB: quantumtrade
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tradingbot:
    build: .
    container_name: qt-tradingbot
    ports:
      - "8080:8080"
      - "8000:8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
       - ./data:/app/data
       - ./data/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: qt-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    depends_on:
      - tradingbot
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # Prometheus - Metrics Collection & Storage
  # ═══════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: qt-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - default

  # ═══════════════════════════════════════════════════════════════════
  # Grafana - Metrics Visualization Dashboard
  # ═══════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: qt-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - default

   # Optional: pgAdmin for database management
   # pgadmin:
   #   image: dpage/pgadmin4:latest
   #   container_name: qt-pgadmin
   #   ports:
   #     - "5050:80"
   #   environment:
   #     PGADMIN_DEFAULT_EMAIL: admin@quantumtrade.local
   #     PGADMIN_DEFAULT_PASSWORD: admin
   #   depends_on:
   #     - postgres
   #   restart: unless-stopped

    # ════════════════════════════════════════════════════════════════════
    # Jaeger - Distributed Tracing
    # ════════════════════════════════════════════════════════════════════
    jaeger:
      image: jaegertracing/all-in-one:latest
      container_name: qt-jaeger
      ports:
        - "16686:16686"   # UI
        - "14268:14268"   # Thrift HTTP
        - "14250:14250"   # gRPC
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:16686"]
        interval: 10s
        timeout: 5s
        retries: 5
      restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # MLflow - Model Registry & Experiment Tracking
  # ═══════════════════════════════════════════════════════════════════
  mlflow:
    image: mlflow/mlflow:latest
    container_name: qt-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # Model Serving - FastAPI Inference Service
  # ═══════════════════════════════════════════════════════════════════
  model-serving:
    build:
      context: .
      dockerfile: quantumtrade/mlops/serving/Dockerfile
    container_name: qt-model-serving
    ports:
      - "8001:8001"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_URL=redis://redis:6379/0
      - SERVING_HOST=0.0.0.0
      - SERVING_PORT=8001
      - SERVING_WORKERS=2
      - SERVING_MODEL_CACHE_SIZE=10
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  pg_data:
    driver: local
  prom_data:
    driver: local
  grafana_data:
    driver: local
  mlflow_data:
    driver: local
  pg_data:
    driver: local
  prom_data:
    driver: local
  grafana_data:
    driver: local
